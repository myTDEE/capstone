<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDEE Calculator</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #f8f6f4 0%, #f1f5bc 25%, #ecf2a0 50%, #e4f28a 75%, #f8f6f4 100%);
    }

    .card-gradient {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
    }

    .activity-btn.active {
      background: #a0b9d9;
      color: white;
      border-color: transparent;
    }
  </style>
</head>

<body class="h-full text-slate-700">

<div class="min-h-full w-full py-8 px-4">
  <div class="max-w-2xl mx-auto">

    <div class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold">TDEE Calculator</h1>
      <p class="mt-2">Understand Your Body’s Daily Calorie Needs</p>
    </div>

    <div class="card-gradient rounded-3xl p-6 md:p-8 border">

      <!-- Gender -->
      <div class="mb-6">
        <label class="block mb-3">Gender</label>
        <div class="flex gap-3">
          <button onclick="selectGender('male')" id="male" class="flex-1 p-3 border rounded">Male</button>
          <button onclick="selectGender('female')" id="female" class="flex-1 p-3 border rounded">Female</button>
        </div>
      </div>

      <!-- Inputs -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <input id="age" type="number" placeholder="Age" class="p-3 border rounded">
        <input id="weight" type="number" placeholder="Weight (kg)" class="p-3 border rounded">
        <input id="height" type="number" placeholder="Height (cm)" class="p-3 border rounded">
      </div>

      <!-- Activity -->
      <div class="mb-6">
        <button onclick="selectActivity(1.2)" class="activity-btn w-full p-3 border rounded mb-2">Sedentary</button>
        <button onclick="selectActivity(1.375)" class="activity-btn w-full p-3 border rounded mb-2">Light</button>
        <button onclick="selectActivity(1.55)" class="activity-btn w-full p-3 border rounded mb-2">Moderate</button>
        <button onclick="selectActivity(1.725)" class="activity-btn w-full p-3 border rounded mb-2">Active</button>
        <button onclick="selectActivity(1.9)" class="activity-btn w-full p-3 border rounded">Very Active</button>
      </div>

      <!-- Button -->
      <button onclick="calculateTDEE()" class="w-full p-4 bg-blue-500 text-white rounded">
        Calculate TDEE
      </button>

      <!-- Result -->
      <div id="result" class="mt-6 text-center text-xl font-bold"></div>

    </div>
  </div>
</div>

<script>
let gender = null;
let activity = null;

function selectGender(g) {
  gender = g;
}

function selectActivity(a) {
  activity = a;
}

function calculateTDEE() {
  const age = +document.getElementById('age').value;
  const weight = +document.getElementById('weight').value;
  const height = +document.getElementById('height').value;

  if (!gender || !activity || !age || !weight || !height) {
    alert('Fill everything');
    return;
  }

  let bmr;

  if (gender === 'male') {
    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
  }

  const tdee = Math.round(bmr * activity);

  document.getElementById('result').innerText = `Your TDEE: ${tdee} kcal/day`;
}
</script>

</body>
</html>
