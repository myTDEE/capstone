<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Slideshow</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Slideshow Logic */
        .slide-section { display: none; min-height: 100vh; width: 100%; }
        .slide-section.active { display: block; }

        /* Navigation Buttons */
        .nav-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 15px;
        }
        .nav-btn {
            background: #23270d;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nav-btn:hover { background: #3d4417; transform: translateY(-2px); }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Your Original TDEE Styles */
        * { font-family: 'Poppins', sans-serif; }
        .gradient-bg { background: linear-gradient(180deg, #f8f6f4 0%, #f1f5bc 25%, #ecf2a0 50%, #e4f28a 75%, #f8f6f4 100%); }
        .card-gradient { background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.98) 100%); backdrop-filter: blur(10px); }
        .glow-effect { box-shadow: 0 0 30px rgba(160, 185, 217, 0.08), 0 0 60px rgba(160, 185, 217, 0.04); }
        .activity-btn.active { background: linear-gradient(135deg, #a0b9d9 0%, #a0b9d9 100%); color: white; border-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full overflow-x-hidden">

    <!-- PAGE 1: INTRO SLIDE -->
    <section id="slide1" class="slide-section active">
        <div style="position: relative; width: 100%; height: 0; padding-top: 56.25%; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); overflow: hidden; will-change: transform;">
            <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
                src="https://www.canva.com/design/DAHFDXpSJgo/_yQz355KAXtsmI1DT7VzoA/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
            </iframe>
        </div>
    </section>

    <!-- PAGE 2: TDEE CALCULATOR -->
    <section id="slide2" class="slide-section gradient-bg">
        <div class="min-h-full w-full py-8 px-4">
            <div class="max-w-2xl mx-auto">
                <div class="text-center mb-8">
                    <h1 id="main-title" class="text-3xl md:text-4xl font-bold" style="color: #23270d;">TDEE Calculator</h1>
                    <p id="subtitle" class="mt-2" style="color: #555555;">Understand Your Body’s Daily Calorie Needs</p>
                </div>
                <!-- Calculator Card -->
                <div class="card-gradient rounded-3xl p-6 md:p-8 glow-effect border border-slate-700/50">
                    <!-- Gender Selection -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-3">Gender</label>
                        <div class="flex gap-3">
                            <button id="gender-male" onclick="selectGender('male')" class="flex-1 py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all flex items-center justify-center gap-2"> <i data-lucide="user" class="w-5 h-5"></i> <span>Male</span> </button> 
                            <button id="gender-female" onclick="selectGender('female')" class="flex-1 py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all flex items-center justify-center gap-2"> <i data-lucide="user" class="w-5 h-5"></i> <span>Female</span> </button>
                        </div>
                    </div>
                    <!-- Age, Weight, Height -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Age</label>
                            <input type="number" id="age" placeholder="25" class="w-full bg-white/70 border-2 border-slate-300 rounded-xl py-3 px-4 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Weight (kg)</label>
                            <input type="number" id="weight" placeholder="70" class="w-full bg-white/70 border-2 border-slate-300 rounded-xl py-3 px-4 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Height (cm)</label>
                            <input type="number" id="height" placeholder="175" class="w-full bg-white/70 border-2 border-slate-300 rounded-xl py-3 px-4 outline-none">
                        </div>
                    </div>
                    <!-- Activity -->
                    <div class="mb-6 space-y-2">
                        <label class="block text-sm font-medium text-slate-700 mb-3">Activity Level</label>
                        <button onclick="selectActivity(1.2)" data-activity="1.2" class="activity-btn w-full py-2 px-4 rounded-xl border-2 border-slate-300 text-left">Sedentary (No exercise)</button>
                        <button onclick="selectActivity(1.55)" data-activity="1.55" class="activity-btn w-full py-2 px-4 rounded-xl border-2 border-slate-300 text-left">Moderate (3-5 days/week)</button>
                        <button onclick="selectActivity(1.9)" data-activity="1.9" class="activity-btn w-full py-2 px-4 rounded-xl border-2 border-slate-300 text-left">Very Active (Daily exercise)</button>
                    </div>
                    <!-- Calculate -->
                    <button onclick="calculateTDEE()" class="w-full py-4 px-6 rounded-xl font-semibold text-lg text-white bg-slate-700 hover:bg-slate-800 transition-all">Calculate TDEE</button>
                    <!-- Result Area -->
                    <div id="results" class="hidden mt-8 animate-in text-center">
                        <p class="text-slate-600">Your Maintenance Calories</p>
                        <p id="tdee-result" class="text-5xl font-bold text-blue-600">0</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- PAGE 3: OUTRO SLIDE -->
    <section id="slide3" class="slide-section">
        <div style="position: relative; width: 100%; height: 0; padding-top: 56.25%; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); overflow: hidden; will-change: transform;">
            <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
                src="https://www.canva.com/design/DAHJKjUO96c/PjFDdqxKplaqSv5udvLMow/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
            </iframe>
        </div>
    </section>

    <!-- FLOATING NAVIGATION -->
    <div class="nav-container">
        <button id="prevBtn" class="nav-btn" onclick="moveSlide(-1)" disabled>Previous</button>
        <button id="nextBtn" class="nav-btn" onclick="moveSlide(1)">Next</button>
    </div>

    <script>
        // Slideshow Logic
        let currentStep = 1;
        function moveSlide(direction) {
            // Hide current slide
            document.getElementById(`slide${currentStep}`).classList.remove('active');
            
            // Change step
            currentStep += direction;
            
            // Show new slide
            document.getElementById(`slide${currentStep}`).classList.add('active');
            
            // Button states
            document.getElementById('prevBtn').disabled = (currentStep === 1);
            document.getElementById('nextBtn').disabled = (currentStep === 3);
            
            window.scrollTo(0,0);
        }

        // --- Your TDEE Calculator Logic ---
        let selectedGender = null;
        let selectedActivity = null;

        function selectGender(gender) {
            selectedGender = gender;
            document.getElementById('gender-male').classList.toggle('border-blue-500', gender === 'male');
            document.getElementById('gender-female').classList.toggle('border-blue-500', gender === 'female');
        }

        function selectActivity(level) {
            selectedActivity = level;
            document.querySelectorAll('.activity-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-activity="${level}"]`).classList.add('active');
        }

        function calculateTDEE() {
            const age = parseInt(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            if (!selectedGender || !selectedActivity || !age || !weight || !height) return alert("Fill all fields");

            let bmr = (selectedGender === 'male') 
                ? (10 * weight) + (6.25 * height) - (5 * age) + 5 
                : (10 * weight) + (6.25 * height) - (5 * age) - 161;

            const tdee = Math.round(bmr * selectedActivity);
            document.getElementById('tdee-result').textContent = tdee.toLocaleString();
            document.getElementById('results').classList.remove('hidden');
        }

        lucide.createIcons();
    </script>
</body>
</html>
