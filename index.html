<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDEE Calculator</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<script src="/_sdk/element_sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
* { font-family: 'Poppins', sans-serif; }
.gradient-bg {
background: linear-gradient(180deg, #f8f6f4 0%, #f1f5bc 25%, #ecf2a0 50%, #e4f28a 75%, #f8f6f4 100%);
}
.card-gradient {
background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.98) 100%);
backdrop-filter: blur(10px);
}
.glow-effect {
box-shadow: 0 0 30px rgba(160, 185, 217, 0.08), 0 0 60px rgba(160, 185, 217, 0.04);
}
.input-focus:focus {
box-shadow: 0 0 0 3px rgba(160, 185, 217, 0.1);
}
.result-card {
background: linear-gradient(135deg, rgba(208, 220, 235, 0.25) 0%, rgba(248, 246, 244, 0.2) 100%);
border: 1px solid rgba(160, 185, 217, 0.15);
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
.animate-in {
animation: fadeIn 0.4s ease-out forwards;
}
.activity-btn.active {
background: linear-gradient(135deg, #a0b9d9 0%, #a0b9d9 100%);
border-color: transparent;
color: white;
}
</style>
<style>body { box-sizing: border-box; }</style>
<script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>
<body class="h-full gradient-bg text-slate-700 overflow-auto">
<div class="min-h-full w-full py-8 px-4">
<div class="max-w-2xl mx-auto">
<!-- Header -->
<div class="text-center mb-8">
<h1 id="main-title" class="text-3xl md:text-4xl font-bold" style="color: #23270d;">TDEE Calculator</h1>
<p id="subtitle" class="mt-2" style="color: #555555;">Understand Your Body’s Daily Calorie Needs</p>
</div><!-- Calculator Card -->
<div class="card-gradient rounded-3xl p-6 md:p-8 glow-effect border border-slate-700/50">
<!-- Gender Selection -->
<div class="mb-6">
<label class="block text-sm font-medium text-slate-700 mb-3">Gender</label>
<div class="flex gap-3">
<button id="gender-male" onclick="selectGender('male')" class="flex-1 py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all flex items-center justify-center gap-2"> <i data-lucide="user" class="w-5 h-5"></i> <span>Male</span> </button> <button id="gender-female" onclick="selectGender('female')" class="flex-1 py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all flex items-center justify-center gap-2"> <i data-lucide="user" class="w-5 h-5"></i> <span>Female</span> </button>
</div>
</div><!-- Age, Weight, Height -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
<div>
<label class="block text-sm font-medium text-slate-700 mb-2">Age</label>
<div class="relative">
<input type="number" id="age" placeholder="25" min="15" max="100" class="w-full bg-white/70 border-2 border-slate-300 rounded-xl py-3 px-4 text-slate-700 placeholder-slate-400 input-focus focus:border-blue-400 outline-none transition-all"> <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">years</span>
</div>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 mb-2">Weight</label>
<div class="relative">
<input type="number" id="weight" placeholder="70" min="30" max="300" class="w-full bg-white/70 border-2 border-slate-300 rounded-xl py-3 px-4 text-slate-700 placeholder-slate-400 input-focus focus:border-blue-400 outline-none transition-all"> <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">kg</span>
</div>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 mb-2">Height</label>
<div class="relative">
<input type="number" id="height" placeholder="175" min="100" max="250" class="w-full bg-white/70 border-2 border-slate-300 rounded-xl py-3 px-4 text-slate-700 placeholder-slate-400 input-focus focus:border-blue-400 outline-none transition-all"> <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">cm</span>
</div>
</div>
</div><!-- Activity Level -->
<div class="mb-6">
<label class="block text-sm font-medium text-slate-700 mb-3">Activity Level</label> <button onclick="selectActivity(1.2)" data-activity="1.2" class="activity-btn w-full py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all text-left"> <span class="font-medium">Sedentary</span> <span class="text-slate-600 text-sm ml-2">Little or no exercise</span> </button> <button onclick="selectActivity(1.375)" data-activity="1.375" class="activity-btn w-full py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all text-left"> <span class="font-medium">Light</span> <span class="text-slate-600 text-sm ml-2">Exercise 1-3 days/week</span> </button> <button onclick="selectActivity(1.55)" data-activity="1.55" class="activity-btn w-full py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all text-left"> <span class="font-medium">Moderate</span> <span class="text-slate-600 text-sm ml-2">Exercise 3-5 days/week</span> </button> <button onclick="selectActivity(1.725)" data-activity="1.725" class="activity-btn w-full py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all text-left"> <span class="font-medium">Active</span> <span class="text-slate-600 text-sm ml-2">Exercise 6-7 days/week</span> </button> <button onclick="selectActivity(1.9)" data-activity="1.9" class="activity-btn w-full py-3 px-4 rounded-xl border-2 border-slate-300 bg-white/70 hover:border-blue-400 transition-all text-left"> <span class="font-medium">Very Active</span> <span class="text-slate-600 text-sm ml-2">Hard exercise daily or physical job</span> </button>
</div><!-- Calculate Button --> <button id="calculate-btn" onclick="calculateTDEE()" style="background: linear-gradient(135deg, #91adc0 0%, #7fa0b5 50%, #6d93aa 100%); transition: all 0.3s ease;" onmouseover="this.style.background='linear-gradient(135deg, #a0bacd 0%, #8eadc2 50%, #7c9fb7 100%)'" onmouseout="this.style.background='linear-gradient(135deg, #91adc0 0%, #7fa0b5 50%, #6d93aa 100%)'" class="w-full py-4 px-6 rounded-xl font-semibold text-lg text-white transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2"> <i data-lucide="calculator" class="w-5 h-5"></i> <span id="calculate-btn-text">Calculate TDEE</span> </button> <!-- Error Message -->
<div id="error-message" class="hidden mt-4 p-4 bg-red-200 border border-red-400 rounded-xl text-red-700 text-center"></div><!-- Results Section -->
<div id="results" class="hidden mt-8 animate-in">
<div class="h-px bg-gradient-to-r from-transparent via-slate-300 to-transparent mb-8"></div>
<h2 class="text-xl font-semibold text-center mb-6 text-slate-800">Your Results</h2><!-- Main TDEE Result -->
<div class="result-card rounded-2xl p-6 text-center mb-6">
<p class="text-slate-600 text-sm mb-1">Your TDEE (Maintenance)</p>
<p id="tdee-result" class="text-5xl font-bold bg-gradient-to-r from-blue-400 to-slate-600 bg-clip-text text-transparent">0</p>
<p class="text-slate-600 text-sm mt-1">calories/day</p>
</div><!-- BMR -->
<div class="bg-blue-50 rounded-xl p-4 mb-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-blue-200 flex items-center justify-center">
<i data-lucide="heart-pulse" class="w-5 h-5 text-blue-600"></i>
</div>
<div>
<p class="text-sm text-slate-600">Basal Metabolic Rate</p>
<p class="font-medium text-slate-800">BMR (At rest)</p>
</div>
</div>
<p id="bmr-result" class="text-xl font-semibold text-slate-800">0 cal</p>
</div><!-- Calorie Goals -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-3">
<div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-center">
<i data-lucide="trending-down" class="w-6 h-6 mx-auto mb-2 text-emerald-600"></i>
<p class="text-xs text-slate-600 mb-1">Weight Loss</p>
<p id="loss-result" class="text-lg font-semibold text-emerald-600">0</p>
<p class="text-xs text-slate-500">-500 cal/day</p>
</div>
<div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
<i data-lucide="minus" class="w-6 h-6 mx-auto mb-2 text-blue-600"></i>
<p class="text-xs text-slate-600 mb-1">Maintain</p>
<p id="maintain-result" class="text-lg font-semibold text-blue-600">0</p>
<p class="text-xs text-slate-500">TDEE</p>
</div>
<div class="bg-violet-50 border border-violet-200 rounded-xl p-4 text-center">
<i data-lucide="trending-up" class="w-6 h-6 mx-auto mb-2 text-violet-600"></i>
<p class="text-xs text-slate-600 mb-1">Weight Gain</p>
<p id="gain-result" class="text-lg font-semibold text-violet-600">0</p>
<p class="text-xs text-slate-500">+500 cal/day</p>
</div>
</div><!-- Macro Breakdown -->
<div class="mt-6 bg-blue-50 rounded-xl p-4">
<p class="text-sm font-medium text-slate-800 mb-3">Suggested Macros (Maintenance)</p>
<div class="grid grid-cols-3 gap-3 text-center">
<div>
<p class="text-2xl font-bold text-blue-600" id="protein-result">0g</p>
